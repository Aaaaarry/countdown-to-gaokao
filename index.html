<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="面向高中生的高考与重要考试倒计时，支持最多三个自定义目标与每日句子。" />
    <title>向光而行 · 高考与重要考试倒计时</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-shape shape-one" aria-hidden="true"></div>
    <div class="background-shape shape-two" aria-hidden="true"></div>

    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#" aria-label="返回首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m3.5 10.5 17-7-6.8 17-3.3-6.9-6.9-3.1Zm6.9 3.1L20.5 3.5"></path></svg>
          </span>
          <span>向光而行</span>
        </a>
        <div class="header-copy">
          <p class="header-title">高考与重要考试倒计时</p>
          <p class="header-slogan">记录高考、首考、市统测，也记录想奔赴的每一个目标</p>
        </div>
        <div class="today" aria-label="今天的日期">
          <span id="todayText">正在获取日期...</span>
          <span class="calendar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 3v3m10-3v3M4 9h16M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1Zm3 8h2m4 0h2m-8 4h2m4 0h2"></path></svg>
          </span>
        </div>
      </header>

      <section id="countdownManager" class="countdown-manager" hidden>
        <div class="manager-heading">
          <div>
            <strong>自定义倒计时</strong>
            <p>最多显示三个倒计时，可添加、编辑并调整上下顺序。</p>
          </div>
          <button id="closeManagerButton" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <form id="countdownForm" class="countdown-form">
          <label>
            <span>倒计时名称</span>
            <input id="countdownNameInput" name="name" type="text" maxlength="12" placeholder="例如：期末考试" required />
          </label>
          <label>
            <span>目标日期</span>
            <input id="countdownDateInput" name="date" type="date" required />
          </label>
          <div class="form-actions">
            <button id="submitCountdownButton" class="add-countdown-button" type="submit">添加倒计时</button>
            <button id="cancelEditButton" class="cancel-edit-button" type="button" hidden>取消编辑</button>
          </div>
        </form>
        <p id="countdownLimitHint" class="manager-hint" hidden>已达到三个倒计时上限，请先删除一个倒计时后再添加。</p>
        <div id="countdownManageList" class="countdown-manage-list"></div>
      </section>

      <main>
        <section class="countdown-card" aria-labelledby="countdownSectionTitle">
          <div class="countdown-card-heading">
            <h1 id="countdownSectionTitle" class="visually-hidden">日期倒计时</h1>
            <button id="manageCountdownButton" class="manage-countdown-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0-5v2m0 14v2M3 12h2m14 0h2M5.6 5.6 7 7m10 10 1.4 1.4m0-12.8L17 7M7 17l-1.4 1.4"></path></svg>
              管理倒计时
            </button>
          </div>
          <div id="countdownList" class="countdown-list" aria-live="polite"></div>
        </section>

        <section class="quote-card" aria-labelledby="quoteLabel">
          <div class="quote-topline">
            <p id="quoteLabel" class="quote-label">此刻读到</p>
            <button id="nextQuoteButton" class="next-quote-button" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8.1 8.1 0 0 0-15.5-3M4 4v4h4M4 13a8.1 8.1 0 0 0 15.5 3m.5 4v-4h-4"></path></svg>
              换一句
            </button>
          </div>

          <div id="quoteContent" class="quote-content" aria-live="polite">
            <span class="large-quote-mark" aria-hidden="true">“</span>
            <blockquote id="quoteText">正在准备今天的句子...</blockquote>
            <p id="quoteTranslation" class="quote-translation" hidden></p>
            <div class="quote-attribution">
              <cite id="quoteSource"></cite>
              <p id="quoteSourceBio" class="quote-source-bio" hidden></p>
            </div>
          </div>
          <div class="botanical-decoration" aria-hidden="true">
            <span class="stem"></span>
            <i class="leaf leaf-one"></i><i class="leaf leaf-two"></i><i class="leaf leaf-three"></i>
            <i class="leaf leaf-four"></i><i class="leaf leaf-five"></i><i class="leaf leaf-six"></i>
          </div>
          <span id="quoteCounter" class="visually-hidden">01 / 01</span>
          <div class="quote-status">
            <span id="refreshHint">每5分钟自动换一句，也可以手动刷新</span>
            <span class="demo-badge" title="当前月度句子库仍在扩充中">句子库演示版</span>
          </div>
        </section>
      </main>

      <footer>
        <div>
          <p><span aria-hidden="true">❧</span> 愿你以渺小启程，以伟大结束。 <span aria-hidden="true">❧</span></p>
          <small>倒计时设置与句子记录仅保存在当前浏览器；清除浏览器数据后将丢失。</small>
        </div>
        <span id="currentYear" class="visually-hidden"></span>
      </footer>
    </div>

    <script src="config.js"></script>
    <script src="quotes-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
